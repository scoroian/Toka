include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - patches/**
  plugins:
    # Note: riverpod_lint rules require `dart run custom_lint` in terminal to activate.
    # IDE integration may also need the custom_lint analysis plugin configured separately.
    - custom_lint
  errors:
    missing_required_param: error
    missing_return: error

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_final_fields
