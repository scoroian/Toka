name: toka
description: Cooperative household task manager for couples and flatmates.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5
  firebase_remote_config: ^5.4.5
  firebase_app_check: ^0.3.2+5
  cloud_functions: ^5.1.3

  # Ads & purchases
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.1

  # State & navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.3

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  fl_chart: ^0.68.0

  # Auth social
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # Utils
  shared_preferences: ^2.5.3
  intl: ^0.20.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Generators
  build_runner: ^2.4.14
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4

  # Tests
  mocktail: ^1.0.4
  patrol: ^3.15.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  mock_exceptions: ^0.8.2

  # Quality
  flutter_lints: ^4.0.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3


dependency_overrides:
  # analyzer_plugin 0.12.0 references publiclyExporting2 which doesn't exist
  # in any published analyzer version. Using a local patch that fixes the call.
  analyzer_plugin:
    path: patches/analyzer_plugin

flutter:
  generate: true
  uses-material-design: true
